<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Tải discord-gemini-bot.exe</title>
</head>
<body>
  <p>Đang bắt đầu tải xuống, nếu trình duyệt không tự động tải, hãy nhấn <a id="manual" href="dist/discord-gemini-bot.exe" download>tại đây</a>.</p>
  <script>
    // Try to fetch and programmatically download the EXE.
    (async function(){
      try {
        const url = 'dist/discord-gemini-bot.exe';
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Network response was not ok');
        const blob = await resp.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'discord-gemini-bot.exe';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 2000);
        document.body.innerHTML = '<p>Đã bắt đầu tải xuống. Nếu không, nhấn liên kết tải xuống phía trên.</p>';
      } catch (err) {
        document.body.innerHTML = '<p>Lỗi khi tải tự động: ' + err.message + '</p><p>Nhấn liên kết tải xuống bên trên để tải thủ công.</p>';
      }
    })();
  </script>
</body>
</html>
